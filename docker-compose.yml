services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PRELEGAL_DATABASE_URL: file:/app/data/prelegal.db
      PRELEGAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  backend-data:
